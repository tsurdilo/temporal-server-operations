#matching
matching.rps:
  - value: 1200
matching.numTaskqueueReadPartitions:
  - value: 4
    constraints: {}
    ## this is example for changing for specific tq
  - value: 1
    constraints: {
      namespace: 'default',
      taskQueueName: 'priority-tq'
    }
matching.outstandingTaskAppendsThreshold:
  - value: 500
matching.numTaskqueueWritePartitions:
  - value: 4
    constraints: {}
    ## this is example for changing for specific tq
  - value: 1
    constraints: {
      namespace: 'default',
      taskQueueName: 'priority-tq'
    }
matching.persistenceMaxQPS:
  - value: 2400
#worker
# depends on if schedules used and num of worker pods
# can discuss
worker.schedulerNamespaceStartWorkflowRPS:
  - value: 100
worker.perNamespaceWorkerOptions:
  - value:
      MaxConcurrentWorkflowTaskPollers: 25
      MaxConcurrentActivityTaskPollers: 10
worker.perNamespaceWorkerCount:
  - value: 4
worker.batcherRPS:
  - value: 50
worker.batcherConcurrency:
  - value: 5
